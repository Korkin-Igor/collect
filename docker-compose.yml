services:
  app:
    build:
      context: .
      args:
        APP_USER: ${APP_USER:-app}
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    container_name: ${PROJECT_NAME:-collect}-app
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - ${APP_PORT:-10000}:8000
    tty: true
    stdin_open: true
    init: true
    command: ["php", "-S", "0.0.0.0:8000", "-t", "/app"]
